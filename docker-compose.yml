services:
  # ── STT (Speech-to-Text) — GPU only ────────────────────────────────
  whisper-gpu:
    container_name: foreign-whispers-stt
    profiles: [nvidia]
    image: ghcr.io/speaches-ai/speaches:latest-cuda-12.6.3
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - whisper-cache:/home/ubuntu/.cache/huggingface/hub
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-medium
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://0.0.0.0:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── TTS (Text-to-Speech) — Chatterbox on GPU ──────────────────────
  chatterbox-gpu:
    container_name: foreign-whispers-tts
    profiles: [nvidia]
    image: travisvn/chatterbox-tts-api:latest
    restart: unless-stopped
    shm_size: "8gb"
    ports:
      - "8020:8020"
    environment:
      - DEVICE=cuda
      - DEFAULT_MODEL=multilingual
      - PORT=8020
    volumes:
      - chatterbox-models:/app/models
      - ./pipeline_data/speakers:/app/voices
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── API (orchestrator) — all profiles ─────────────────────────────
  # Mostly delegates GPU work to STT/TTS containers via HTTP, but does run
  # pyannote speaker diarization in-process — that needs GPU access too,
  # otherwise diarize is glacial on CPU and produces empty output on
  # long-form videos.
  api:
    container_name: foreign-whispers-api
    profiles: [nvidia, cpu]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: "${UID:-1000}"
        USER_GID: "${GID:-1000}"
    restart: unless-stopped
    network_mode: host
    command: ["uv", "run", "uvicorn", "api.src.main:app", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      - CHATTERBOX_API_URL=http://localhost:8020
      - FW_WHISPER_MODEL=base
      - FW_HF_TOKEN=${FW_HF_TOKEN:-}
      - FW_LOGFIRE_WRITE_TOKEN=${FW_LOGFIRE_WRITE_TOKEN:-}
      # Chatterbox sampling — biased toward cross-call voice stability over
      # prosody variance. Higher CFG/lower temp keeps timbre consistent across
      # consecutive segments synthesised with the same reference WAV.
      - FW_TTS_TEMPERATURE=0.1
      - FW_TTS_CFG=0.7
      - FW_TTS_EXAGG=0.3
      # Batch consecutive segments into a single Chatterbox call before
      # splitting on silence. Chatterbox keeps voice stable WITHIN one call
      # but drifts across separate calls — batching eliminates inter-segment
      # voice swaps. Set to 0 to fall back to per-segment synthesis.
      - FW_TTS_BATCH=1
    env_file:
      - path: .env
        required: false
    volumes:
      - ./pipeline_data:/app/pipeline_data
      - ./foreign_whispers:/app/foreign_whispers
      - ./api:/app/api
      - ./cookies.txt:/app/cookies.txt
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Frontend (Next.js) — all profiles ──────────────────────────────
  frontend:
    container_name: foreign-whispers-frontend
    profiles: [nvidia, cpu]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    environment:
      - API_URL=http://localhost:8080
      - HOSTNAME=0.0.0.0
      - PORT=8501
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8501"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  whisper-cache:
  chatterbox-models:
